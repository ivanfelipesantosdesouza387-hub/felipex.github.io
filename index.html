<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Sistema - Rio de Janeiro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>RP Sistema</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#search">Buscar</a></li>
                <li><a href="#submit">Submeter Evidência</a></li>
                <li><a href="#admin">Painel de Admin</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Bem-vindo ao RP Sistema!</h2>
            <p>Aqui você pode gerenciar suas evidências e interagir com o sistema.</p>
        </section>
        <section id="search">
            <h2>Buscar Evidência</h2>
            <input type="text" id="searchInput" placeholder="Digite para buscar...">
            <button id="searchButton">Buscar</button>
            <div id="searchResults"></div>
        </section>
        <section id="submit">
            <h2>Submeter Evidência</h2>
            <form id="evidenceForm">
                <input type="text" id="evidenceTitle" placeholder="Título" required>
                <textarea id="evidenceDescription" placeholder="Descrição" required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>
        <section id="admin">
            <h2>Painel de Admin</h2>
            <div id="adminPanel">
                <!-- Admin functionalities here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 RP Sistema - Todos os direitos reservados.</p>
    </footer>
</body>
</html>
